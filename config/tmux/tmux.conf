# Prefix: Ctrl+S
unbind C-b
set -g prefix C-s
bind-key C-s send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -g set-clipboard on
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 50000
set -g escape-time 0

# 화면 분할 (prefix 없이 Alt로)
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"

# Ctrl+hjkl 패널 이동 (nvim 실행 중이면 nvim으로, 아니면 tmux pane 이동)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# prefix+숫자 윈도우 이동 (Alt+1-6은 AeroSpace가 사용)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6

# 새 윈도우, 이전/다음
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-, previous-window
bind -n M-. next-window

# 패널 닫기, 전체화면
bind -n M-x kill-pane
bind -n M-z resize-pane -Z

# 창 위치 교체 (Alt+화살표)
bind -n M-Left  swap-pane -t '{left-of}'
bind -n M-Right swap-pane -t '{right-of}'
bind -n M-Up    swap-pane -t '{up-of}'
bind -n M-Down  swap-pane -t '{down-of}'

# 창 크기 조절 (Alt+Shift+화살표, 5칸씩)
bind -n M-S-Left  resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up    resize-pane -U 5
bind -n M-S-Down  resize-pane -D 5

# 세션 분리
bind -n M-d detach-client

# 복사 모드 vi
set -g mode-keys vi
bind -n M-m copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# 상태바 (Gruvbox 팔레트)
# bg0_hard=#1d2021  bg0=#282828  bg1=#3c3836  bg2=#504945
# fg=#ebdbb2  yellow=#d79921  orange=#d65d0e  green=#98971a  blue=#458588  aqua=#689d6a
set -g status-position bottom
set -g status-style                'bg=#282828,fg=#ebdbb2'

# 왼쪽: [세션명] 현재경로
set -g status-left-length 40
set -g status-left          '#[bg=#d79921,fg=#282828,bold] #S #[bg=#282828,fg=#d79921]#[default] #[fg=#a89984]#{b:pane_current_path} '

# 오른쪽: prefix 표시 + 날짜/시간
set -g status-right-length 40
set -g status-right         '#[fg=#a89984]%Y-%m-%d #[fg=#d79921,bold]%H:%M '

# 윈도우 탭
set -g window-status-format         ' #I:#W '
set -g window-status-current-format '#[bg=#458588,fg=#282828,bold] #I:#W #[bg=#282828,fg=#458588]'
set -g window-status-style          'fg=#a89984'

# 구분선
set -g pane-border-style        'fg=#504945'
set -g pane-active-border-style 'fg=#d79921'

# 메시지 (prefix 입력 시 등)
set -g message-style 'bg=#d79921,fg=#282828,bold'

# 설정 리로드
bind r source-file ~/.config/tmux/tmux.conf \; display "리로드!"
