# Prefix: Ctrl+S
unbind C-b
set -g prefix C-s
bind-key C-s send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -s extended-keys always
set -as terminal-features 'xterm*:extkeys'
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g history-limit 50000
set -g escape-time 0

# 화면 분할 (prefix 없이 Alt로)
bind -n M-v split-window -h -c "#{pane_current_path}"
bind -n M-s split-window -v -c "#{pane_current_path}"

# Ctrl+hjkl 패널 이동 (nvim 실행 중이면 nvim으로, 아니면 tmux pane 이동)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# prefix+숫자 윈도우 이동 (Alt+1-6은 AeroSpace가 사용)
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6

# 새 윈도우, 이전/다음
bind -n M-c new-window -c "#{pane_current_path}"
bind -n M-, previous-window
bind -n M-. next-window

# 패널 닫기, 전체화면
bind -n M-x kill-pane
bind -n M-z resize-pane -Z

# 창 위치 교체 (Alt+화살표)
bind -n M-Left  swap-pane -t '{left-of}'
bind -n M-Right swap-pane -t '{right-of}'
bind -n M-Up    swap-pane -t '{up-of}'
bind -n M-Down  swap-pane -t '{down-of}'

# 창 크기 조절 (Alt+Shift+화살표, 5칸씩)
bind -n M-S-Left  resize-pane -L 5
bind -n M-S-Right resize-pane -R 5
bind -n M-S-Up    resize-pane -U 5
bind -n M-S-Down  resize-pane -D 5

# 세션 분리
bind -n M-d detach-client

# 복사 모드 vi
set -g mode-keys vi
bind -n M-m copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

# 상태바
set -g status-position bottom
set -g status-bg '#1c1c1c'
set -g status-fg '#d0d0d0'
set -g status-left '#[fg=green][#S] '
set -g status-right '#[fg=yellow]%H:%M '

# 설정 리로드
bind r source-file ~/.config/tmux/tmux.conf \; display "리로드!"
